<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>État des lieux véhicule — Harceleurs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@500&family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body { font-family: 'DM Sans', sans-serif; min-height: 100vh; transition: background 0.4s, color 0.4s; }

    body.dark {
      --bg: #0e0e0e; --bg2: #141414; --bg3: #1a1a1a;
      --border: #2a2a2a; --border2: #1e1e1e;
      --text: #e8e6e0; --text2: #aaa; --text3: #666; --text4: #555;
      --accent: #c8a84b; --accent-bg: rgba(200,168,75,0.1); --accent-border: rgba(200,168,75,0.25);
      --input-bg: #1a1a1a; --input-border: #2a2a2a;
      --valid: #4a8c4a; --error: #c0392b; --error-bg: #1a0a0a;
      --prog-bg: #1e1e1e; --prog-fill: #c8a84b;
      --send-bg: #c8a84b; --send-text: #0e0e0e;
      --done-bg: #0a1a0a; --done-text: #4a8c4a;
      --slot-bg: #141414; --extra-bg: #1a1a1a;
      --toggle-bg: #333;
    }
    body.light {
      --bg: #f8f6f1; --bg2: #ffffff; --bg3: #ffffff;
      --border: #e0dbd4; --border2: #e8e4dc;
      --text: #1a1a1a; --text2: #555; --text3: #999; --text4: #bbb;
      --accent: #b8860b; --accent-bg: rgba(200,168,75,0.12); --accent-border: rgba(200,168,75,0.35);
      --input-bg: #ffffff; --input-border: #ddd;
      --valid: #4a8c4a; --error: #c0392b; --error-bg: #fff5f5;
      --prog-bg: #e8e4dc; --prog-fill: #1a1a2e;
      --send-bg: #1a1a2e; --send-text: #ffffff;
      --done-bg: #f0faf0; --done-text: #4a8c4a;
      --slot-bg: #ffffff; --extra-bg: #ffffff;
      --toggle-bg: #c8a84b;
    }

    body { background: var(--bg); color: var(--text); }
    .app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

    /* TOP BAR */
    .top-bar {
      background: var(--bg2); border-bottom: 1px solid var(--border);
      padding: 13px 16px; display: flex; align-items: center; gap: 8px;
      position: sticky; top: 0; z-index: 100;
      transition: background 0.4s, border-color 0.4s;
    }
    .top-bar-left { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
    .clap { width: 24px; height: 24px; border-radius: 3px; display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
    body.dark  .clap { background: #fff; }
    body.light .clap { background: #1a1a1a; }
    .clap-top { height: 8px; display: flex; align-items: center; gap: 1.5px; padding: 0 2px; }
    body.dark  .clap-top { background: #111; }
    body.light .clap-top { background: #f8f6f1; }
    .clap-stripe { width: 2px; height: 5px; border-radius: 1px; }
    body.dark  .clap-stripe { background: #fff; }
    body.light .clap-stripe { background: #1a1a1a; }
    .clap-bottom { flex: 1; }
    body.dark  .clap-bottom { background: #fff; }
    body.light .clap-bottom { background: #1a1a1a; }
    .bar-title { font-family: 'Playfair Display', serif; font-size: 14px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color 0.4s; }
    .proj-tag { font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 500; letter-spacing: 0.1em; padding: 3px 8px; border-radius: 4px; color: var(--accent); background: var(--accent-bg); border: 1px solid var(--accent-border); white-space: nowrap; flex-shrink: 0; transition: all 0.4s; }
    .toggle-wrap { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
    .toggle-icon { font-size: 12px; line-height: 1; user-select: none; }
    .toggle-btn { width: 38px; height: 21px; border-radius: 11px; border: none; outline: none; cursor: pointer; position: relative; background: var(--toggle-bg); transition: background 0.35s; flex-shrink: 0; }
    .toggle-knob { position: absolute; top: 3.5px; left: 3.5px; width: 14px; height: 14px; border-radius: 50%; background: #fff; transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); box-shadow: 0 1px 4px rgba(0,0,0,0.35); }
    body.light .toggle-knob { transform: translateX(17px); }

    /* CONTENT */
    .content { padding: 16px; display: flex; flex-direction: column; gap: 13px; flex: 1; }
    .section-title { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.09em; color: var(--text4); padding-bottom: 7px; border-bottom: 1px solid var(--border); transition: color 0.4s, border-color 0.4s; }
    .section-title .opt { font-style: italic; font-weight: 300; text-transform: none; letter-spacing: 0; font-size: 9px; }

    .field { display: flex; flex-direction: column; gap: 4px; }
    .field-row { display: flex; gap: 8px; }
    .field-row .field { flex: 1; min-width: 0; }
    .field label { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 2px; transition: color 0.4s; }
    .req { color: var(--accent); font-size: 10px; }
    .field input, .field select, .field textarea {
      padding: 9px 12px; border-radius: 9px; border: 1px solid var(--input-border);
      background: var(--input-bg); color: var(--text); font-size: 14px;
      font-family: 'DM Sans', sans-serif; outline: none; width: 100%;
      transition: background 0.4s, border-color 0.3s, color 0.4s;
      -webkit-appearance: none;
    }
    .field textarea { resize: none; line-height: 1.6; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
    .field input.valid, .field select.valid { border-color: var(--valid); }
    .field input.error, .field select.error { border-color: var(--error); background: var(--error-bg); }
    .immat-wrap { display: flex; justify-content: center; }
    .immat-input { font-family: 'DM Mono', monospace !important; font-size: 20px !important; font-weight: 500 !important; letter-spacing: 0.15em !important; text-transform: uppercase !important; text-align: center !important; max-width: 210px; }

    /* PHOTO GRID */
    .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .photo-last { display: flex; justify-content: center; margin-top: 8px; }
    .photo-last .photo-slot { width: calc(50% - 4px); }
    .photo-slot { border: 1px dashed var(--border); border-radius: 12px; background: var(--slot-bg); aspect-ratio: 4/3; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; position: relative; overflow: hidden; -webkit-tap-highlight-color: transparent; transition: background 0.4s, border-color 0.3s; }
    .photo-slot.filled { border-style: solid; border-color: var(--valid); }
    .photo-slot.error  { border-style: solid; border-color: var(--error); background: var(--error-bg); }
    .photo-slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; border-radius: 11px; }
    .photo-slot { gap: 5px; }
    .slot-label { font-size: 9px; font-weight: 500; color: var(--text4); text-align: center; padding: 0 4px; line-height: 1.3; position: relative; z-index: 1; transition: color 0.4s; }
    .slot-actions { display: flex; gap: 4px; position: relative; z-index: 1; }
    .slot-btn { display: flex; align-items: center; gap: 3px; padding: 5px 8px; border-radius: 7px; border: 1px solid var(--border); background: var(--bg2); color: var(--text3); font-size: 10px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.15s; white-space: nowrap; -webkit-tap-highlight-color: transparent; }
    .slot-btn:active { opacity: 0.7; }
    .slot-btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; flex-shrink: 0; }
    .slot-btn.cam { border-color: var(--accent-border); color: var(--accent); background: var(--accent-bg); }
    .retake-btn { position: absolute; bottom: 20px; right: 5px; background: rgba(0,0,0,0.55); border: none; border-radius: 5px; padding: 3px 6px; font-size: 9px; color: #fff; cursor: pointer; display: flex; align-items: center; gap: 3px; z-index: 4; font-family: 'DM Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
    .retake-btn svg { width: 10px; height: 10px; stroke: #fff; fill: none; stroke-width: 2; }
    .slot-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.62); padding: 4px 6px; font-size: 9px; font-weight: 500; color: #fff; text-align: center; border-radius: 0 0 11px 11px; z-index: 2; }
    .check-badge { position: absolute; top: 5px; right: 5px; width: 18px; height: 18px; border-radius: 50%; background: var(--valid); display: flex; align-items: center; justify-content: center; z-index: 3; }
    .check-badge svg { width: 10px; height: 10px; stroke: #fff; fill: none; stroke-width: 2.5; }
    .photo-counter { font-size: 10px; color: var(--text4); text-align: right; margin-top: -7px; transition: color 0.4s; }
    .photo-counter span { font-weight: 500; color: var(--text3); }
    .photo-counter.done span { color: var(--valid); }

    /* EXTRAS */
    .extra-list { display: flex; flex-direction: column; gap: 6px; }
    .extra-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: var(--extra-bg); border: 1px solid var(--border); border-radius: 9px; transition: background 0.4s, border-color 0.4s; }
    .extra-item img { width: 38px; height: 38px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
    .extra-item span { font-size: 11px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text2); }
    .extra-del { background: none; border: none; cursor: pointer; padding: 4px; color: var(--text4); }
    .extra-del svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; display: block; }
    .add-btn { display: flex; align-items: center; justify-content: center; gap: 7px; padding: 10px; border-radius: 9px; border: 1px dashed var(--border); background: transparent; color: var(--text3); font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; width: 100%; transition: all 0.4s; -webkit-tap-highlight-color: transparent; }
    .add-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

    /* SEND */
    .prog-bar { height: 3px; border-radius: 2px; overflow: hidden; background: var(--prog-bg); transition: background 0.4s; }
    .prog-fill { height: 100%; border-radius: 2px; background: var(--prog-fill); width: 0%; transition: width 0.35s ease, background 0.4s; }
    .validation-banner { display: none; padding: 10px 13px; background: var(--error-bg); border: 1px solid var(--error); border-radius: 9px; font-size: 12px; color: #e57373; line-height: 1.5; }
    .done-msg { display: none; padding: 12px; background: var(--done-bg); border-radius: 9px; font-size: 13px; color: var(--done-text); text-align: center; font-weight: 500; }
    .send-btn { width: 100%; padding: 14px; background: var(--send-bg); color: var(--send-text); border: none; border-radius: 12px; font-size: 15px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-family: 'DM Sans', sans-serif; transition: background 0.4s, color 0.4s, opacity 0.15s; -webkit-tap-highlight-color: transparent; }
    .send-btn:active { opacity: 0.8; }
    .send-btn svg { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 2; }
    .send-btn.loading { opacity: 0.6; pointer-events: none; }
    .bottom-spacer { height: max(env(safe-area-inset-bottom), 16px); }
  </style>
</head>
<body class="dark">
<div class="app">

  <div class="top-bar">
    <div class="top-bar-left">
      <div class="clap">
        <div class="clap-top"><div class="clap-stripe"></div><div class="clap-stripe"></div><div class="clap-stripe"></div></div>
        <div class="clap-bottom"></div>
      </div>
      <span class="bar-title">État des lieux véhicule</span>
    </div>
    <span class="proj-tag" id="projTag">HARCELEURS</span>
    <div class="toggle-wrap">
      <span class="toggle-icon">🌙</span>
      <button class="toggle-btn" onclick="toggleTheme()" aria-label="Changer de thème"><div class="toggle-knob"></div></button>
      <span class="toggle-icon">☀️</span>
    </div>
  </div>

  <div class="content">

    <div class="section-title">Contact</div>
    <div class="field-row">
      <div class="field"><label>Prénom <span class="req">*</span></label><input type="text" id="prenom" placeholder="Jean" oninput="validateField(this)" autocomplete="given-name" /></div>
      <div class="field"><label>Nom <span class="req">*</span></label><input type="text" id="nom" placeholder="Dupont" oninput="validateField(this)" autocomplete="family-name" /></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Téléphone <span class="req">*</span></label><input type="tel" id="tel" placeholder="06 00 00 00 00" oninput="validateField(this)" autocomplete="tel" /></div>
      <div class="field"><label>Email <span class="req">*</span></label><input type="email" id="email" placeholder="jean@mail.com" oninput="validateField(this)" autocomplete="email" /></div>
    </div>
    <div class="field">
      <label>Poste <span class="req">*</span></label>
      <select id="poste" onchange="validateField(this)"><option value="">— Sélectionner un poste —</option></select>
    </div>

    <div class="section-title">Véhicule</div>
    <div class="field">
      <label style="justify-content:center;">Immatriculation <span class="req">*</span></label>
      <div class="immat-wrap"><input class="immat-input" type="text" id="immat" placeholder="AB-123-CD" maxlength="9" oninput="formatImmat(this);validateField(this)" autocomplete="off" autocorrect="off" autocapitalize="characters" /></div>
    </div>
    <div class="field">
      <label>Loueur <span class="req">*</span></label>
      <input type="text" id="loueur" placeholder="Ex : Europcar, Hertz…" oninput="validateField(this)" />
    </div>

    <div class="section-title">Photos par angle <span class="req">*</span></div>
    <div class="photo-counter" id="photoCounter"><span>0</span> / 9 photos</div>
    <div class="photo-grid" id="photoGrid"></div>
    <div class="photo-last"  id="photoLast"></div>

    <div class="section-title">Photo supplémentaire si nécessaire <span class="opt">(optionnel)</span></div>
    <div class="extra-list" id="extraList"></div>
    <button class="add-btn" onclick="addExtra()">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Ajouter une photo
    </button>
    <input type="file" id="extraInput" accept="image/*" style="display:none" onchange="handleExtra(this)" />
    <div class="field">
      <label>Remarque</label>
      <textarea id="remarque" rows="3" placeholder="Observation complémentaire…"></textarea>
    </div>

    <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
    <div class="validation-banner" id="validationBanner"></div>
    <div class="done-msg" id="doneMsg">✓ Envoyé dans Google Drive et Google Sheets !</div>
    <button class="send-btn" id="sendBtn" onclick="trySend()">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12"/><path d="M22 12l-4-4m4 4l-4 4"/><path d="M22 12H2"/></svg>
      Envoyer vers Google Drive
    </button>
    <div class="bottom-spacer"></div>
  </div>
</div>

<script>
  /* ============================================================
     CONFIGURATION — modifier uniquement cette section par projet
  ============================================================ */
  const CONFIG = {
    projet: "Harceleurs",
    driveEndpoint: "https://script.google.com/macros/s/AKfycbxwE8lRVIpoe0p083LWdLS1C7ADqkBQTQKkNgfGCZhXOnqW0vgzcUHPtZ4YugbwXVja/exec", // ← coller ici l'URL du Google Apps Script après déploiement
    postes: [
      "Accessoires","Caméra","Coiffure","Décoration","Électricité",
      "Habillage","Machinerie","Maquillage","MFX","Mise en Scène",
      "Production","Régie","SFX","Son","VFX"
    ]
  };
  /* ============================================================ */

  const SLOTS_GRID = [
    {id:'avant',label:'Avant'},{id:'arriere',label:'Arrière'},
    {id:'lat-g',label:'Latéral Gauche'},{id:'lat-d',label:'Latéral Droit'},
    {id:'lat-ag',label:'Latéral Arrière Gauche'},{id:'lat-ad',label:'Latéral Arrière Droit'},
    {id:'lat-vg',label:'Latéral Avant Gauche'},{id:'lat-vd',label:'Latéral Avant Droit'},
  ];
  const SLOT_LAST = {id:'tableau',label:'Tableau de bord'};
  const ALL_SLOTS = [...SLOTS_GRID, SLOT_LAST];
  const camSVG   = `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><circle cx="12" cy="13" r="3.5"/><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h3l2-3h8l2 3h3a2 2 0 0 1 2 2z"/></svg>`;
  const galSVG   = `<svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`;
  const retSVG   = `<svg viewBox="0 0 24 24" fill="none" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4"/></svg>`;
  const checkSVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`;
  const photoData = {};
  const extraPhotos = [];
  let isDark = true;

  function toggleTheme() {
    isDark = !isDark;
    document.body.classList.toggle('dark', isDark);
    document.body.classList.toggle('light', !isDark);
  }

  function init() {
    document.getElementById('projTag').textContent = CONFIG.projet;
    document.title = `État des lieux — ${CONFIG.projet}`;
    const sel = document.getElementById('poste');
    CONFIG.postes.forEach(p => { const o=document.createElement('option'); o.value=p; o.textContent=p; sel.appendChild(o); });
    buildGrid();
  }

  function makeSlot(slot, container) {
    const div = document.createElement('div');
    div.className='photo-slot'; div.id='slot-'+slot.id;
    div.innerHTML=`
      <span class="slot-label">${slot.label}</span>
      <div class="slot-actions">
        <button class="slot-btn cam" onclick="triggerCamera('${slot.id}')">${camSVG} Photo</button>
        <button class="slot-btn" onclick="triggerGallery('${slot.id}')">${galSVG} Galerie</button>
      </div>`;
    container.appendChild(div);

    // Bouton Photo : capture=environment force la caméra sur Android
    const cam = document.createElement('input');
    cam.type='file'; cam.accept='image/*'; cam.capture='environment';
    cam.style.display='none'; cam.id='cam-'+slot.id;
    cam.onchange = function(){ handleSlot(slot.id, this); };
    document.body.appendChild(cam);

    // Bouton Galerie : sans capture → ouvre la galerie
    const gal = document.createElement('input');
    gal.type='file'; gal.accept='image/*';
    gal.style.display='none'; gal.id='gal-'+slot.id;
    gal.onchange = function(){ handleSlot(slot.id, this); };
    document.body.appendChild(gal);
  }

  function buildGrid() {
    const g=document.getElementById('photoGrid'), l=document.getElementById('photoLast');
    SLOTS_GRID.forEach(s=>makeSlot(s,g));
    makeSlot(SLOT_LAST,l);
  }

  function triggerCamera(id)  { const i=document.getElementById('cam-'+id); i.value=''; i.click(); }
  function triggerGallery(id) { const i=document.getElementById('gal-'+id); i.value=''; i.click(); }

  function handleSlot(id, input) {
    const file=input.files[0]; if(!file) return;
    const r=new FileReader();
    r.onload=e=>{
      photoData[id]=e.target.result;
      const label=ALL_SLOTS.find(s=>s.id===id).label;
      const slot=document.getElementById('slot-'+id);
      slot.classList.remove('error'); slot.classList.add('filled');
      slot.innerHTML=`
        <img src="${e.target.result}" alt="${label}"/>
        <div class="slot-overlay">${label}</div>
        <div class="check-badge">${checkSVG}</div>
        <button class="retake-btn" onclick="showRetakeMenu('${id}',event)">${retSVG} Reprendre</button>`;
      updateCounter();
    };
    r.readAsDataURL(file);
  }

  function showRetakeMenu(id, e) {
    e.stopPropagation();
    const slot=document.getElementById('slot-'+id);
    const old=slot.querySelector('.retake-menu');
    if(old){ old.remove(); return; }
    const menu=document.createElement('div');
    menu.className='retake-menu';
    menu.style.cssText='position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);border-radius:8px;padding:5px;display:flex;gap:5px;z-index:10;';
    menu.innerHTML=`
      <button onclick="triggerCamera('${id}');this.closest('.retake-menu').remove();"
        style="background:none;border:1px solid rgba(200,168,75,0.6);border-radius:5px;color:#c8a84b;font-size:9px;padding:4px 8px;cursor:pointer;display:flex;align-items:center;gap:3px;font-family:'DM Sans',sans-serif;">
        <svg viewBox="0 0 24 24" style="width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:2;"><circle cx="12" cy="13" r="3.5"/><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h3l2-3h8l2 3h3a2 2 0 0 1 2 2z"/></svg> Photo
      </button>
      <button onclick="triggerGallery('${id}');this.closest('.retake-menu').remove();"
        style="background:none;border:1px solid rgba(255,255,255,0.25);border-radius:5px;color:#ccc;font-size:9px;padding:4px 8px;cursor:pointer;display:flex;align-items:center;gap:3px;font-family:'DM Sans',sans-serif;">
        <svg viewBox="0 0 24 24" style="width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:2;"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg> Galerie
      </button>`;
    slot.appendChild(menu);
    setTimeout(()=>{ document.addEventListener('click',()=>menu.remove(),{once:true}); },100);
  }

  function updateCounter(){
    const n=Object.keys(photoData).length;
    const el=document.getElementById('photoCounter');
    el.innerHTML=`<span>${n}</span> / 9 photos`;
    el.className='photo-counter'+(n===9?' done':'');
    document.getElementById('progFill').style.width=Math.round((n/9)*100)+'%';
  }

  function validateField(el){
    if(el.value.trim()){el.classList.remove('error');el.classList.add('valid');}
    else{el.classList.remove('valid');}
  }

  function formatImmat(input){
    let v=input.value.replace(/[^a-zA-Z0-9]/g,'').toUpperCase();
    if(v.length>5) v=v.slice(0,2)+'-'+v.slice(2,5)+'-'+v.slice(5,7);
    else if(v.length>2) v=v.slice(0,2)+'-'+v.slice(2);
    input.value=v;
  }

  function addExtra(){const i=document.getElementById('extraInput');i.value='';i.click();}
  function handleExtra(input){
    const file=input.files[0]; if(!file) return;
    const r=new FileReader();
    r.onload=e=>{extraPhotos.push({src:e.target.result,name:file.name});renderExtras();};
    r.readAsDataURL(file);
  }
  function renderExtras(){
    const list=document.getElementById('extraList'); list.innerHTML='';
    extraPhotos.forEach((item,i)=>{
      const d=document.createElement('div'); d.className='extra-item';
      d.innerHTML=`<img src="${item.src}" alt="${item.name}"/><span>${item.name}</span><button class="extra-del" onclick="removeExtra(${i})"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`;
      list.appendChild(d);
    });
  }
  function removeExtra(i){extraPhotos.splice(i,1);renderExtras();}

  function trySend(){
    const required=['prenom','nom','tel','email','poste','immat','loueur'];
    const errors=[]; let first=null;
    required.forEach(id=>{
      const el=document.getElementById(id);
      if(!el.value.trim()){
        el.classList.add('error'); el.classList.remove('valid');
        if(!first) first=el;
        const lbl=el.closest('.field').querySelector('label').textContent.replace('*','').trim();
        errors.push(lbl);
      }
    });
    const missing=ALL_SLOTS.filter(s=>!photoData[s.id]);
    missing.forEach(s=>{
      document.getElementById('slot-'+s.id).classList.add('error');
      if(!first) first=document.getElementById('slot-'+s.id);
    });
    if(missing.length) errors.push(`${missing.length} photo(s) manquante(s)`);
    const banner=document.getElementById('validationBanner');
    if(errors.length){
      banner.style.display='block';
      banner.innerHTML=`Champs requis manquants : <strong>${errors.join(', ')}</strong>`;
      if(first) first.scrollIntoView({behavior:'smooth',block:'center'});
      return;
    }
    banner.style.display='none';
    CONFIG.driveEndpoint ? sendToDrive() : simulateSend();
  }

  function simulateSend(){
    const btn=document.getElementById('sendBtn'), fill=document.getElementById('progFill'), done=document.getElementById('doneMsg');
    btn.classList.add('loading'); done.style.display='none';
    const steps=['Compression…','Création du dossier Drive…','Envoi des photos…','Mise à jour du Sheets…','Finalisation…'];
    let p=0, si=0; fill.style.width='0%';
    const iv=setInterval(()=>{
      p+=Math.random()*13+5;
      if(p>=100){p=100;clearInterval(iv);fill.style.width='100%';setTimeout(()=>{btn.classList.remove('loading');done.style.display='block';},400);}
      else{fill.style.width=Math.round(p)+'%';}
    },220);
  }

  async function sendToDrive(){
    const btn=document.getElementById('sendBtn'), done=document.getElementById('doneMsg');
    btn.classList.add('loading'); done.style.display='none';
    const payload={
      projet:   CONFIG.projet,
      date:     new Date().toLocaleString('fr-FR'),
      prenom:   document.getElementById('prenom').value,
      nom:      document.getElementById('nom').value,
      tel:      document.getElementById('tel').value,
      email:    document.getElementById('email').value,
      poste:    document.getElementById('poste').value,
      immat:    document.getElementById('immat').value,
      loueur:   document.getElementById('loueur').value,
      remarque: document.getElementById('remarque').value,
      photos:   photoData,
      extras:   extraPhotos,
    };
    try{
      const res=await fetch(CONFIG.driveEndpoint,{method:'POST',body:JSON.stringify(payload)});
      const json=await res.json();
      if(json.status==='ok'){document.getElementById('progFill').style.width='100%';done.style.display='block';}
      else{alert('Erreur lors de l\'envoi. Veuillez réessayer.');}
    }catch(e){
      alert('Impossible de joindre Google Drive. Vérifiez votre connexion.');
    }finally{btn.classList.remove('loading');}
  }

  init();
</script>
</body>
</html>
